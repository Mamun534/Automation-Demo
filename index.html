<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> Automation Demo </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
  }
  .header {
    background: #fff;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #ddd;
  }
  .logo {
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
  }
  .search input {
    padding: 6px;
    width: 250px;
  }
  .nav {
    background: #007bff;
    color: #fff;
    padding: 10px;
  }
  .nav span {
    margin-right: 15px;
    cursor: pointer;
  }
  .banner {
    overflow: hidden;
    height: 180px;
    background: #111;
    color: #fff;
    display: flex;
    align-items: center;
  }
  .slider {
    display: flex;
    animation: slide 15s linear infinite;
  }
  .slider img {
    height: 180px;
    width: 300px;
    margin-right: 10px;
  }
  @keyframes slide {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }
  .container { padding: 20px; }
  .products {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }
  .card {
    background: #fff;
    padding: 10px;
    border: 1px solid #ddd;
    text-align: center;
  }
  .card img { width: 100%; height: 150px; }
  .btn {
    background: #007bff;
    color: #fff;
    padding: 6px;
    border: none;
    cursor: pointer;
    margin: 3px;
  }
  .footer {
    background: #222;
    color: #fff;
    text-align: center;
    padding: 20px;
    margin-top: 20px;
  }
  .modal {
    display: none;
    position: fixed;
    top: 15%;
    left: 25%;
    width: 50%;
    background: #fff;
    padding: 20px;
    border: 1px solid #ccc;
    z-index: 1000;
  }
  input, select {
    padding: 6px;
    margin: 5px;
    width: 90%;
  }
  .pagination {
    margin-top: 20px;
    text-align: center;
  }
  .pagination button {
    padding: 6px 10px;
    margin: 3px;
    cursor: pointer;
  }
  .table-container { overflow-x: auto; margin-top: 20px; }
  table { width: 100%; border-collapse: collapse; }
  th, td {
    padding: 10px;
    border: 1px solid #ddd;
    text-align: left;
  }
  .action-btns button { margin-right: 5px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo" onclick="goHome()">OpenCart</div>
  <div class="search"><input id="searchBox" placeholder="Search..."></div>
  <div><span onclick="openCart()">Cart (<span id="cartCount">0</span>)</span></div>
</div>

<div class="nav">
  <span onclick="goHome()">Home</span>
  <span onclick="loadCategory('Phones')">Phones</span>
  <span onclick="loadCategory('Laptops')">Laptops</span>
  <span onclick="loadCategory('Accessories')">Accessories</span>
  <span onclick="adminLoginPrompt()">Admin Panel</span>
</div>

<div class="banner" id="banner">
  <div class="slider">
    <img src="https://picsum.photos/300/180?1">
    <img src="https://picsum.photos/300/180?2">
    <img src="https://picsum.photos/300/180?3">
    <img src="https://picsum.photos/300/180?4">
    <img src="https://picsum.photos/300/180?5">
    <img src="https://picsum.photos/300/180?6">
    <img src="https://picsum.photos/300/180?7">
    <img src="https://picsum.photos/300/180?8">
    <img src="https://picsum.photos/300/180?9">
    <img src="https://picsum.photos/300/180?10">
    <img src="https://picsum.photos/300/180?11">
    <img src="https://picsum.photos/300/180?12">
    <img src="https://picsum.photos/300/180?13">
    <img src="https://picsum.photos/300/180?14">
    <img src="https://picsum.photos/300/180?15">
    <img src="https://picsum.photos/300/180?16">
    <img src="https://picsum.photos/300/180?17">
    <img src="https://picsum.photos/300/180?18">
    <img src="https://picsum.photos/300/180?19">
    <img src="https://picsum.photos/300/180?20">
  </div>
</div>

<div class="container" id="page"></div>
<div class="pagination" id="pagination"></div>
<div class="footer">© MC Automation Demo </div>

<!-- CART MODAL -->
<div class="modal" id="cartModal">
  <h3>Cart</h3>
  <div id="cartItems"></div>
  <h4>Total: $<span id="total"></span></h4>
  <button class="btn" onclick="checkoutPage()">Checkout</button>
  <button onclick="closeCart()">Close</button>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal" id="checkoutModal">
  <h3>Payment</h3>
  <input placeholder="Card Number">
  <input placeholder="Name">
  <input placeholder="Address">
  <button class="btn" onclick="completeOrder()">Pay Now</button>
  <button onclick="closeCheckout()">Close</button>
</div>

<!-- ADMIN MODAL -->
<div class="modal" id="adminModal">
  <h3 id="adminModalTitle">Add/Edit Product</h3>
  <input id="productName" placeholder="Product Name">
  <input id="productPrice" placeholder="Price">
  <select id="productCategory">
    <option value="Phones">Phones</option>
    <option value="Laptops">Laptops</option>
    <option value="Accessories">Accessories</option>
  </select>
  <input id="productImg" placeholder="Image URL">
  <button class="btn" id="saveProductBtn">Save</button>
  <button onclick="closeAdminModal()">Close</button>
</div>

<!-- CUSTOMER MODAL -->
<div class="modal" id="customerModal">
  <h3 id="customerModalTitle">Customer</h3>
  <input id="custName" placeholder="Name">
  <input id="custEmail" placeholder="Email">
  <input id="custGroup" placeholder="Customer Group">
  <input id="custStatus" placeholder="Status">
  <input id="custDate" placeholder="Date Added">
  <button class="btn" id="saveCustomerBtn">Save</button>
  <button onclick="closeCustomerModal()">Close</button>
</div>

<!-- VIEW MODAL -->
<div class="modal" id="viewModal">
  <h3>Customer Details</h3>
  <div id="viewContent"></div>
  <button class="btn" onclick="closeView()">Close</button>
</div>

<script>
  // Initialize data
  let products = JSON.parse(localStorage.getItem('products')) || [];
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  let pageData = JSON.parse(localStorage.getItem('pageData')) || {};
  let editingIndex = null;
  let currentPage = 1;

  if (products.length === 0) {
    for (let i = 1; i <= 20; i++) {
      products.push({id: Date.now()+i, cat:'Phones', name:'iPhone '+i, price:800+i, img:'https://picsum.photos/200?random='+i});
      products.push({id: Date.now()+i+100, cat:'Laptops', name:'Laptop '+i, price:1200+i, img:'https://picsum.photos/200?random='+(i+50)});
      products.push({id: Date.now()+i+200, cat:'Accessories', name:'Accessory '+i, price:50+i, img:'https://picsum.photos/200?random='+(i+100)});
    }
    saveAll();
  }

  function saveAll() {
    localStorage.setItem('products', JSON.stringify(products));
    localStorage.setItem('cart', JSON.stringify(cart));
    localStorage.setItem('pageData', JSON.stringify(pageData));
  }

  // Functions for home, categories, and cart
  function goHome() { 
    document.getElementById('banner').style.display='flex'; // show slider on home
    render(products); 
    renderPagination(); 
  }
  function render(list) {
    let html = '';
    list.forEach(p => {
      html += `<div class="card"><img src="${p.img}"><h4>${p.name}</h4><p>$${p.price}</p><button class="btn" onclick="addToCart(${p.id})">Add</button></div>`;
    });
    document.getElementById('page').innerHTML = `<div class='products'>${html}</div>`;
  }
  function loadCategory(cat) { render(products.filter(p => p.cat === cat)); renderPagination(); }

  function addToCart(id) {
    let item = cart.find(c => c.id === id);
    if(item) item.qty = (item.qty || 1) + 1;
    else { let p = products.find(x => x.id === id); cart.push({...p, qty:1}); }
    updateCart(); saveAll();
  }
  function updateCart() { document.getElementById('cartCount').innerText = cart.reduce((a,b)=>a+(b.qty||0),0); }
  function openCart() {
    let html='', total=0;
    cart.forEach(c => { let qty=c.qty||1; total += c.price*qty; html+=`${c.name} x${qty} - $${c.price*qty}<br>`; });
    document.getElementById('cartItems').innerHTML = html;
    document.getElementById('total').innerText = total;
    document.getElementById('cartModal').style.display = 'block';
  }
  function closeCart() { document.getElementById('cartModal').style.display = 'none'; }
  function checkoutPage() { document.getElementById('checkoutModal').style.display = 'block'; }
  function closeCheckout() { document.getElementById('checkoutModal').style.display = 'none'; }
  function completeOrder() { alert('Payment Successful!'); cart=[]; saveAll(); updateCart(); closeCheckout(); closeCart(); }

  // Admin functions
  function adminLoginPrompt() {
    let user=prompt("Enter Admin Username:");
    let pass=prompt("Enter Admin Password:");
    if(user==='mamun' && pass==='5634120'){ openAdmin(); }
    else{ alert("Invalid credentials!"); }
  }
  function openAdmin() {
    let html=`<h2>Admin Panel</h2><button class='btn' onclick='openAddEditModal()'>Add Product</button><br><br>`;
    products.forEach((p,i) => {
      html += `${p.name} - $${p.price} <button onclick='editProduct(${i})'>Edit</button> <button onclick='deleteProduct(${i})'>Delete</button><br>`;
    });
    document.getElementById('page').innerHTML = html;
  }
  function openAddEditModal() { editingIndex=null; document.getElementById('adminModalTitle').innerText='Add Product'; document.getElementById('productName').value=''; document.getElementById('productPrice').value=''; document.getElementById('productCategory').value='Phones'; document.getElementById('productImg').value=''; document.getElementById('adminModal').style.display='block'; }
  function editProduct(index) { editingIndex=index; let p=products[index]; document.getElementById('adminModalTitle').innerText='Edit Product'; document.getElementById('productName').value=p.name; document.getElementById('productPrice').value=p.price; document.getElementById('productCategory').value=p.cat; document.getElementById('productImg').value=p.img; document.getElementById('adminModal').style.display='block'; }
  document.getElementById('saveProductBtn').addEventListener('click', ()=>{
    let name=document.getElementById('productName').value;
    let price=parseFloat(document.getElementById('productPrice').value);
    let cat=document.getElementById('productCategory').value;
    let img=document.getElementById('productImg').value;
    if(editingIndex!==null){ products[editingIndex]={...products[editingIndex],name,price,cat,img}; } 
    else { products.push({id:Date.now(), name, price, cat, img}); }
    saveAll(); openAdmin(); closeAdminModal();
  });
  function deleteProduct(i){ products.splice(i,1); saveAll(); openAdmin(); }
  function closeAdminModal(){ document.getElementById('adminModal').style.display='none'; }

  // Customer modal and data
  function editCustomer(page,i){ let c=pageData[page][i]; editingIndex=i; document.getElementById('customerModalTitle').innerText='Edit Customer'; document.getElementById('custName').value=c.name; document.getElementById('custEmail').value=c.email; document.getElementById('custGroup').value=c.group; document.getElementById('custStatus').value=c.status; document.getElementById('custDate').value=c.date; document.getElementById('customerModal').style.display='block'; }
  function addCustomer(){ editingIndex=null; document.getElementById('customerModalTitle').innerText='Add Customer'; document.getElementById('custName').value=''; document.getElementById('custEmail').value=''; document.getElementById('custGroup').value=''; document.getElementById('custStatus').value=''; document.getElementById('custDate').value=''; document.getElementById('customerModal').style.display='block'; }
  function closeCustomerModal(){ document.getElementById('customerModal').style.display='none'; }
  document.getElementById('saveCustomerBtn').addEventListener('click',()=>{
    let c={name:document.getElementById('custName').value,email:document.getElementById('custEmail').value,group:document.getElementById('custGroup').value,status:document.getElementById('custStatus').value,date:document.getElementById('custDate').value};
    if(editingIndex!==null){ pageData[currentPage][editingIndex]=c; } else { pageData[currentPage].push(c); }
    closeCustomerModal(); renderPageData(currentPage);
  });
  function deleteCustomer(page,i){ if(confirm('Are you sure?')){ pageData[page].splice(i,1); renderPageData(page); } }
  function viewCustomer(page,i){ let c=pageData[page][i]; document.getElementById('viewContent').innerHTML=`<p><b>Name:</b> ${c.name}</p><p><b>Email:</b> ${c.email}</p><p><b>Group:</b> ${c.group}</p><p><b>Status:</b> ${c.status}</p><p><b>Date Added:</b> ${c.date}</p>`; document.getElementById('viewModal').style.display='block'; }
  function closeView(){ document.getElementById('viewModal').style.display='none'; }

  // Search
  document.getElementById('searchBox').addEventListener('keyup',()=>{ let v=document.getElementById('searchBox').value.toLowerCase(); render(products.filter(p=>p.name.toLowerCase().includes(v))); });

  // Pagination
  function renderPagination(){ let container=document.getElementById('pagination'); container.innerHTML=''; for(let i=1;i<=10;i++){ let btn=document.createElement('button'); btn.innerText=i; btn.onclick=()=>{ currentPage=i; renderPageData(i); }; container.appendChild(btn); } }
  for(let p=1;p<=10;p++){ if(!pageData[p]){ pageData[p]=[]; for(let i=1;i<=5;i++){ pageData[p].push({name:`Customer ${p}-${i}`,email:`cust${p}${i}@example.com`,group:`Group ${i}`,status:'Active',date:'2026-04-01'}); } } }
  function renderPageData(page){ 
    document.getElementById('banner').style.display='none'; // hide slider on pagination pages
    let html=`<div class='table-container'><h3>Page ${page} Data</h3><button class='btn' onclick='addCustomer()'>Add Customer</button><table><tr><th>Name</th><th>Email</th><th>Customer Groups</th><th>Status</th><th>Date Added</th><th>Action</th></tr>`;
    pageData[page].forEach((c,i)=>{ html+=`<tr><td>${c.name}</td><td>${c.email}</td><td>${c.group}</td><td>${c.status}</td><td>${c.date}</td><td class="action-btns"><button onclick='editCustomer(${page},${i})'>Edit</button><button onclick='deleteCustomer(${page},${i})'>Delete</button><button onclick='viewCustomer(${page},${i})'>View</button></td></tr>` });
    html+=`</table></div>`;
    document.getElementById('page').innerHTML=html;
    saveAll(); 
  }

  goHome();
</script>
</body>
</html>
